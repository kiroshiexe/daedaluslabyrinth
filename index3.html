<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hacker Terminal</title>

  <!-- Font style for terminal -->
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Share Tech Mono', monospace;
    }

    body {
      background-color: #000;
      color: #00ff00;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .binary {
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 200%;
      color: #0f0;
      font-size: 18px;
      line-height: 1.2;
      white-space: pre;
      opacity: 0.1;
      animation: scroll 20s linear infinite;
    }

    @keyframes scroll {
      to { transform: translateY(100%); }
    }

    .terminal {
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid #0f0;
      padding: 20px;
      width: 80%;
      max-width: 800px;
      height: 400px;
      overflow-y: auto;
      border-radius: 5px;
      box-shadow: 0 0 10px #0f0;
    }

    .terminal h1 {
      font-size: 24px;
      margin-bottom: 10px;
      text-shadow: 0 0 5px #0f0;
      animation: glitch 2s infinite;
    }

    @keyframes glitch {
      0%, 100% { text-shadow: 2px 0 red, -2px 0 blue; }
      25% { text-shadow: -2px 0 lime, 2px 0 cyan; }
      50% { text-shadow: 2px 2px magenta, -2px -2px yellow; }
      75% { text-shadow: -1px 1px #0f0, 1px -1px #0ff; }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: #0f0;
    }

    ::-webkit-scrollbar-track {
      background: #000;
    }

    .input-area {
      display: flex;
      align-items: center;
      margin-top: 10px;
    }

    .input-area input {
      background: transparent;
      border: none;
      color: #00ff00;
      width: 100%;
      font-size: 18px;
      padding: 5px;
      outline: none;
    }

    .input-area input::placeholder {
      color: #00ff00;
    }

    .options {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      background: transparent;
      color: #00ff00;
      border: 1px solid #00ff00;
      padding: 10px;
      cursor: pointer;
      font-size: 18px;
      transition: background-color 0.3s, color 0.3s;
    }

    .option-btn:hover {
      background-color: #00ff00;
      color: #000;
    }
  </style>
</head>

<body>
  <div class="background">
    <div class="binary">
      01010101011100010101101001010011<br>
      11010100101001010101010101010101<br>
      01101010100101101010100101011010<br>
      10100101010010101001010101010101<br>
      01010101010101010101010101010101<br>
    </div>
  </div>

  <div class="terminal">
    <h1>root@kali:~# ./start</h1>
    <div id="output">
      <p>Welcome to the system!</p>
      <p>Type 'enter' to begin.</p>
    </div>

    <div class="input-area">
      <span class="prompt">root@kali:~#</span>
      <input type="text" id="commandInput" placeholder="Enter a command..." autofocus />
    </div>
  </div>

  <script>
    const inputField = document.getElementById("commandInput");
    const outputArea = document.getElementById("output");
    let waitingForExitConfirmation = false;

    inputField.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        const command = inputField.value.trim().toLowerCase();
        inputField.value = "";

        if (waitingForExitConfirmation) {
          if (command === "y") {
            outputArea.innerHTML = "<p>Exiting... Reloading interface.</p>";
            setTimeout(() => {
              window.location.reload();
            }, 1000);
          } else if (command === "n") {
            outputArea.innerHTML += "<p>Exit canceled. Returning to menu...</p>";
            waitingForExitConfirmation = false;
            loadMainMenu();
          } else {
            outputArea.innerHTML += "<p>Invalid input. Type 'y' to confirm exit or 'n' to cancel.</p>";
          }
          return;
        }

        if (command === "enter") {
          clearTerminal();
          loadMainMenu();
        } else if (command === "1" || command === "exit") {
          outputArea.innerHTML += "<p>Are you sure you want to exit? (y/n)</p>";
          waitingForExitConfirmation = true;
        } else {
          outputArea.innerHTML += `<p>$ ${command}: Command not found.</p>`;
        }
      }
    });

    function clearTerminal() {
      outputArea.innerHTML = "";
    }

    function loadMainMenu() {
      outputArea.innerHTML += "<p>Welcome to the terminal interface!</p>";
      outputArea.innerHTML += "<p>Select an option:</p>";

      const optionsDiv = document.createElement('div');
      optionsDiv.classList.add('options');

      const option1 = document.createElement('button');
      option1.classList.add('option-btn');
      option1.textContent = "1 - Exit";
      option1.onclick = function () {
        outputArea.innerHTML += "<p>Are you sure you want to exit? (y/n)</p>";
        waitingForExitConfirmation = true;
      };

      const option2 = document.createElement('button');
      option2.classList.add('option-btn');
      option2.textContent = "2 - Library";
      option2.onclick = function () {
        alert('Opening Library...');
      };

      const option3 = document.createElement('button');
      option3.classList.add('option-btn');
      option3.textContent = "3 - Help"
      option3.onclick = function () {
        alert('Opening Contact...');
      };

      const option4 = document.createElement('button');
      option4.classList.add('option-btn');
      option4.textContent = "4 - About";
      option4.onclick = function () {
        alert('About this terminal...');
      };

      const option5 = document.createElement('button');
      option5.classList.add('option-btn');
      option5.textContent = "5 - Final Challenge";
      option5.onclick = function () {
        alert('Starting Final Challenge...');
      };

      optionsDiv.append(option1, option2, option3, option4, option5);
      outputArea.appendChild(optionsDiv);
    }
  </script>
</body>
</html>
